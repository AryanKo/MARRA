name: MARRA CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -sf http://localhost:6333/healthz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install and Start Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve &

        echo "Waiting for Ollama service to become healthy..."
        for i in {1..30}; do
          if curl -s http://localhost:11434/api/tags > /dev/null; then
            echo "Ollama is ready!"
            break
          fi
          echo "Waiting for Ollama... attempt $i"
          sleep 2
        done

    - name: Pull Embeddings Model
      run: |
        ollama pull nomic-embed-text

    - name: Run Unit Tests
      env:
        # Inject Gemini API key from repository secrets.
        # Add GEMINI_API_KEY to your repo: Settings > Secrets > Actions.
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        QDRANT_HOST: localhost
        QDRANT_PORT: 6333
      run: |
        pytest tests/ -v
