name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Install and Start Ollama
      run: |
        # Install Ollama native binary
        curl -fsSL https://ollama.com/install.sh | sh
        # Start server in background
        ollama serve &
        
        # Strict polling loop to ensure Ollama is ready before proceeding
        echo "Waiting for Ollama service to become healthy..."
        for i in {1..30}; do
          if curl -s http://localhost:11434/api/tags >/dev/null; then
            echo "Ollama is ready!"
            break
          fi
          echo "Waiting for Ollama... attempt $i"
          sleep 2
        done
        
    - name: Pull Embeddings Model
      run: |
        # Pull nomic-embed-text (~274MB) natively unmocked
        ollama pull nomic-embed-text
        
    - name: Run Pytest
      env:
        # For future generation tests we will use a small model
        LLM_MODEL: tinydolphin
        # Limit LangGraph recursion to prevent infinite loops during testing
        MAX_LANGGRAPH_RECURSION: 3
      run: |
        pytest tests/
